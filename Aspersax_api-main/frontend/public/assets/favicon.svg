<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#45b939"/>
      <stop offset="100%" style="stop-color:#1a9f0b"/>
    </linearGradient>
  </defs>
  <!-- Fondo transparente para mejor visibilidad -->
  <rect width="100" height="100" fill="transparent"/>
  
  <g transform="translate(10,15) scale(0.8)">
    <!-- Hojas más grandes y definidas -->
    <path d="M50 10 Q65 10 80 25 Q65 40 50 35 Q35 40 20 25 Q35 10 50 10" 
          fill="url(#gradient)" stroke="none"/>
    
    <!-- Tallo central -->
    <line x1="50" y1="35" x2="50" y2="85" 
          stroke="url(#gradient)" stroke-width="6"/>
    
    <!-- Círculo central -->
    <circle cx="50" cy="25" r="8" fill="url(#gradient)"/>
    
    <!-- Líneas horizontales con puntos -->
    <line x1="30" y1="55" x2="70" y2="55" 
          stroke="url(#gradient)" stroke-width="4"/>
    <circle cx="30" cy="55" r="4" fill="url(#gradient)"/>
    <circle cx="70" cy="55" r="4" fill="url(#gradient)"/>
    
    <!-- Puntos decorativos -->
    <circle cx="20" cy="25" r="3" fill="url(#gradient)"/>
    <circle cx="80" cy="25" r="3" fill="url(#gradient)"/>
    
    <!-- Líneas de conexión laterales -->
    <line x1="15" y1="70" x2="35" y2="70" 
          stroke="url(#gradient)" stroke-width="4"/>
    <line x1="65" y1="70" x2="85" y2="70" 
          stroke="url(#gradient)" stroke-width="4"/>
    <circle cx="15" cy="70" r="4" fill="url(#gradient)"/>
    <circle cx="35" cy="70" r="4" fill="url(#gradient)"/>
    <circle cx="65" cy="70" r="4" fill="url(#gradient)"/>
    <circle cx="85" cy="70" r="4" fill="url(#gradient)"/>
  </g>
</svg> 